<svg viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">

<style>
@keyframes fly {
  0%   { transform: translateX(0px); }
  100% { transform: translateX(760px); }
}

@keyframes rotor {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.drone {
  animation: fly 12s linear infinite;
}

.rotor {
  transform-origin: center;
  animation: rotor 0.15s linear infinite;
}
</style>

<rect width="800" height="120" fill="#0d1117"/>

<rect x="100" y="50" width="12" height="12" fill="#2ea043"/>
<rect x="250" y="20" width="12" height="12" fill="#2ea043"/>
<rect x="400" y="70" width="12" height="12" fill="#2ea043"/>
<rect x="550" y="40" width="12" height="12" fill="#2ea043"/>
<rect x="700" y="60" width="12" height="12" fill="#2ea043"/>

<g class="drone">

  <line x1="0" y1="56" x2="40" y2="56"
        stroke="#58a6ff"
        stroke-width="2"/>

  <circle cx="20" cy="56" r="10" fill="#58a6ff"/>

  <line class="rotor"
        x1="10" y1="56"
        x2="30" y2="56"
        stroke="white"
        stroke-width="2"/>

  <line class="rotor"
        x1="20" y1="46"
        x2="20" y2="66"
        stroke="white"
        stroke-width="2"/>

</g>

</svg>
