<!-- DRONE FRAME X -->
<g id="drone">

  <animateMotion
    dur="12s"
    repeatCount="indefinite"
    rotate="auto">
    <mpath href="#flightpath"/>
  </animateMotion>

  <!-- Braços -->
  <line x1="-20" y1="-20" x2="20" y2="20"
        stroke="#c9d1d9"
        stroke-width="4"/>

  <line x1="20" y1="-20" x2="-20" y2="20"
        stroke="#c9d1d9"
        stroke-width="4"/>

  <!-- Corpo -->
  <rect x="-10" y="-10"
        width="20"
        height="20"
        rx="3"
        fill="#1f6feb"/>

  <!-- Seta frontal -->
  <polygon points="0,-16 -5,-8 5,-8"
           fill="#ff7b72"/>

  <!-- Hélice 1 -->
  <g transform="translate(-25,-25)">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0"
      to="360"
      dur="0.08s"
      repeatCount="indefinite"/>
    <line x1="-8" y1="0" x2="8" y2="0"
          stroke="#58a6ff"
          stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="8"
          stroke="#58a6ff"
          stroke-width="2"/>
  </g>

  <!-- Hélice 2 -->
  <g transform="translate(25,-25)">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0"
      to="-360"
      dur="0.08s"
      repeatCount="indefinite"/>
    <line x1="-8" y1="0" x2="8" y2="0"
          stroke="#58a6ff"
          stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="8"
          stroke="#58a6ff"
          stroke-width="2"/>
  </g>

  <!-- Hélice 3 -->
  <g transform="translate(-25,25)">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0"
      to="-360"
      dur="0.08s"
      repeatCount="indefinite"/>
    <line x1="-8" y1="0" x2="8" y2="0"
          stroke="#58a6ff"
          stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="8"
          stroke="#58a6ff"
          stroke-width="2"/>
  </g>

  <!-- Hélice 4 -->
  <g transform="translate(25,25)">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0"
      to="360"
      dur="0.08s"
      repeatCount="indefinite"/>
    <line x1="-8" y1="0" x2="8" y2="0"
          stroke="#58a6ff"
          stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="8"
          stroke="#58a6ff"
          stroke-width="2"/>
  </g>

</g>
