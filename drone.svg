```svg
<svg xmlns="http://www.w3.org/2000/svg"
     width="900"
     height="220"
     viewBox="0 0 900 220">

  <style>
    .path {
      fill: none;
      stroke: #58a6ff;
      stroke-width: 3;
      stroke-dasharray: 8 6;
      opacity: .5;
    }

    .waypoint {
      fill: #39d353;
      animation: pulse 1.5s infinite;
    }

    .label {
      fill: #c9d1d9;
      font-family: Arial, sans-serif;
      font-size: 10px;
    }

    .prop {
      transform-origin: center;
      animation: spin .08s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%,100% { opacity:1; }
      50% { opacity:.4; }
    }
  </style>

  <!-- rota -->

  <path id="flightpath"
        class="path"
        d="M80 160
           Q180 80 280 100
           Q400 130 500 70
           Q620 30 720 120
           Q780 180 840 90"/>

  <!-- waypoints -->

  <rect class="waypoint" x="174" y="78" width="12" height="12"/>
  <text class="label" x="170" y="70">WP1</text>

  <rect class="waypoint" x="274" y="98" width="12" height="12"/>
  <text class="label" x="270" y="90">WP2</text>

  <rect class="waypoint" x="494" y="68" width="12" height="12"/>
  <text class="label" x="490" y="60">WP3</text>

  <rect class="waypoint" x="714" y="118" width="12" height="12"/>
  <text class="label" x="710" y="110">WP4</text>

  <rect class="waypoint" x="834" y="88" width="12" height="12"/>
  <text class="label" x="830" y="80">WP5</text>

  <!-- drone -->

  <g>

    <animateMotion
      dur="12s"
      repeatCount="indefinite"
      rotate="auto">
      <mpath href="#flightpath"/>
    </animateMotion>

    <!-- braços -->

    <line x1="-20" y1="-20"
          x2="20" y2="20"
          stroke="#c9d1d9"
          stroke-width="4"/>

    <line x1="20" y1="-20"
          x2="-20" y2="20"
          stroke="#c9d1d9"
          stroke-width="4"/>

    <!-- corpo -->

    <rect x="-10"
          y="-10"
          width="20"
          height="20"
          rx="3"
          fill="#1f6feb"/>

    <!-- frente -->

    <polygon points="0,-16 -5,-8 5,-8"
             fill="#ff7b72"/>

    <!-- motor 1 -->

    <g class="prop">
      <circle cx="-25" cy="-25" r="7"
              fill="none"
              stroke="#58a6ff"
              stroke-width="2"/>
      <line x1="-33" y1="-25"
            x2="-17" y2="-25"
            stroke="#58a6ff"
            stroke-width="2"/>
      <line x1="-25" y1="-33"
            x2="-25" y2="-17"
            stroke="#58a6ff"
            stroke-width="2"/>
    </g>

    <!-- motor 2 -->

    <g class="prop">
      <circle cx="25" cy="-25" r="7"
              fill="none"
              stroke="#58a6ff"
              stroke-width="2"/>
      <line x1="17" y1="-25"
            x2="33" y2="-25"
            stroke="#58a6ff"
            stroke-width="2"/>
      <line x1="25" y1="-33"
            x2="25" y2="-17"
            stroke="#58a6ff"
            stroke-width="2"/>
    </g>

    <!-- motor 3 -->

    <g class="prop">
      <circle cx="-25" cy="25" r="7"
              fill="none"
              stroke="#58a6ff"
              stroke-width="2"/>
      <line x1="-33" y1="25"
            x2="-17" y2="25"
            stroke="#58a6ff"
            stroke-width="2"/>
      <line x1="-25" y1="17"
            x2="-25" y2="33"
            stroke="#58a6ff"
            stroke-width="2"/>
    </g>

    <!-- motor 4 -->

    <g class="prop">
      <circle cx="25" cy="25" r="7"
              fill="none"
              stroke="#58a6ff"
              stroke-width="2"/>
      <line x1="17" y1="25"
            x2="33" y2="25"
            stroke="#58a6ff"
            stroke-width="2"/>
      <line x1="25" y1="17"
            x2="25" y2="33"
            stroke="#58a6ff"
            stroke-width="2"/>
    </g>

  </g>

</svg>
```
